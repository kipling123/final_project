{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SDN Dash{% endblock %}</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="dark-theme">
    <div class="glass-container">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <h1>SDN<span>Guard</span></h1>
            </div>
            <nav>
                <a href="{% url 'networks:dashboard' %}" class="nav-item active">
                    <span class="icon">📊</span> Dashboard
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">🔗</span> Topology
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">📁</span> Logs
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">⚙️</span> Settings
                </a>
            </nav>
            <div class="status-panel">
                <div class="status-item">
                    <span class="label">Controller</span>
                    <span class="value online">Online</span>
                </div>
                <div class="status-item">
                    <span class="label">Switches</span>
                    <span class="value">4 Active</span>
                </div>
            </div>
        </aside>

        <main class="content">
            <header class="top-bar">
                <div class="search-bar">
                    <input type="text" placeholder="Search nodes, IP, links...">
                </div>
                <div class="user-profile">
                    <span class="notification">🔔</span>
                    <div class="avatar"></div>
                </div>
            </header>
            
            <div class="view-container">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
